<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-[#ece9e7] font-sans overflow-hidden">
    <div class="flex h-screen">
      <aside
        id="sidebar"
        class="w-20 bg-[#171822] text-white flex flex-col justify-between py-6 transition-all duration-300"
      >
        <div>
          <div class="flex justify-center mb-10 text-4xl font-bold">f</div>
          <nav class="space-y-6 px-5">
            <button
              class="nav-btn w-full flex justify-center text-gray-400 hover:text-white"
              data-page="overview"
            >
             <a href="/index.html"><i data-lucide="home"></i></a>
            </button>
            <button
              class="nav-btn w-full flex justify-center  text-teal-400"
              data-page="transfer"
            >
              <a href="/transactions.html"
                ><i data-lucide="arrow-up-down"></i
              ></a>
            </button>
            <button
              class="nav-btn w-full flex justify-center text-gray-400 hover:text-white"
              data-page="analytics"
            >
             <a href="/budgets.html"> <i data-lucide="pie-chart"></i> </a>
            </button>
            <button
              class="nav-btn w-full flex justify-center text-gray-400 hover:text-white"
              data-page="pots"
            >
             <a href="/pots.html">  <i data-lucide="wallet"></i> </a>
            </button>
            <button
              class="nav-btn w-full flex justify-center text-gray-400 hover:text-white"
              data-page="transactions"
            >
                <a href="/recurring-bills.html">  <i data-lucide="receipt"></i> </a>
            </button>
          </nav>
        </div>
        <div class="px-5">
          <button
            class="w-full flex justify-center text-gray-400 hover:text-white"
          >
            <i data-lucide="log-out"></i>
          </button>
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-8 relative">
        <div class="flex items-center justify-between mb-8">
          <h1 id="pageTitle" class="text-3xl font-bold text-[#1f2230]">
            Transactions
          </h1>
          <button
            id="openModalBtn"
            class="bg-[#171822] text-white px-5 py-3 rounded-xl flex items-center gap-2 font-semibold text-sm hover:bg-gray-800 transition"
          >
            +Add New Transaction
          </button>
        </div>

        <section id="transactions" class="page">
          <div class="bg-white rounded-xl p-6 text-gray-700">
            <!-- Toolbar -->
            <div class="flex items-center justify-between mb-6 gap-4">
              <div class="relative w-1/3">
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Search transaction"
                  class="w-full pl-4 pr-10 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200"
                />
              </div>
              <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 text-sm text-gray-500">
                  <span class="whitespace-nowrap">Sort by</span>
                  <select id="sortSelect" class="border rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-gray-200">
                    <option value="latest">Latest</option>
                    <option value="oldest">Oldest</option>
                  </select>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-500">
                  <span class="whitespace-nowrap">Filter by Category</span>
                  <select id="categorySelect" class="border rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-gray-200">
                    <option value="all">All Transactions</option>
                    <option value="education">Education</option>
                    <option value="transportation">Transportation</option>
                    <option value="food">Food</option>
                    <option value="utilities">Utilities</option>
                    <option value="entertainment">Entertainment</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Table Header -->
            <div class="grid grid-cols-4 border-b pb-3 mb-4 text-sm text-gray-400">
              <div class="font-medium">Recipient / Sender</div>
              <div class="font-medium">Category</div>
              <div class="font-medium">Transaction Date</div>
              <div class="font-medium text-right">Amount</div>
            </div>

            <!-- Table Body -->
            <div id="transactionsList" class="space-y-4 min-h-[300px]">
              <!-- Transactions will be rendered here dynamically -->
            </div>

            <!-- Pagination -->
            <div class="flex items-center justify-between mt-8 border-t pt-6">
              <button id="prevPageBtn" class="flex items-center gap-1 border px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 disabled:opacity-50">
                <i data-lucide="chevron-left" class="w-4 h-4"></i> Prev
              </button>
              <div id="paginationNumbers" class="flex items-center gap-2">
                <!-- Page numbers rendered here dynamically -->
              </div>
              <button id="nextPageBtn" class="flex items-center gap-1 border px-4 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 disabled:opacity-50">
                Next <i data-lucide="chevron-right" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </section>

        <!-- Modal Overlay -->
        <div id="transactionModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 items-center justify-center">
          <!-- Modal Content -->
        <div class="bg-white rounded-2xl w-full max-w-md p-6 relative">
          <button id="closeModalBtn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
          
          <h2 class="text-xl font-bold text-[#1f2230] mb-6">Add New Transaction</h2>
          
          <form id="transactionForm" class="space-y-4">
            <div>
              <label class="block text-sm text-gray-600 mb-1">Transaction Name</label>
              <input
                type="text"
                id="tName"
                maxlength="30"
                required
                placeholder="e.g Urban Services Hub"
                class="w-full border-2 border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-gray-800"
              />
              <div class="text-right text-xs text-gray-400 mt-1"><span id="charCount">30</span> characters left</div>
            </div>

            <div>
              <label class="block text-sm text-gray-600 mb-1">Transaction Date</label>
              <input
                type="date"
                id="tDate"
                required
                class="w-full bg-[#fdfaf8] border border-transparent rounded-xl px-4 py-3 outline-none focus:border-gray-200"
              />
            </div>

            <div>
              <label class="block text-sm text-gray-600 mb-1">Category</label>
              <select
                id="tCategory"
                required
                class="w-full border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-gray-300 appearance-none bg-white"
              >
                <option value="" disabled selected>Select a category</option>
                <option value="education">Education</option>
                <option value="transportation">Transportation</option>
                <option value="food">Food</option>
                <option value="utilities">Utilities</option>
                <option value="entertainment">Entertainment</option>
              </select>
            </div>

            <div>
              <label class="block text-sm text-gray-600 mb-1">Amount</label>
              <input
                type="number"
                id="tAmount"
                step="0.01"
                required
                placeholder="e.g $1000"
                class="w-full border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-gray-300"
              />
            </div>

            <div class="flex items-center gap-2">
              <label class="text-sm text-gray-600">Recurring</label>
              <input type="checkbox" id="tRecurring" class="w-4 h-4 rounded border-gray-300" />
            </div>

            <button type="submit" class="w-full bg-[#202124] text-white py-4 rounded-xl font-bold mt-4 hover:bg-gray-800 transition">
              Submit
            </button>
          </form>
        </div>
      </main>
    </div>
    <script>
      lucide.createIcons();
    </script>
    <script src="/router.js"></script>
    <script src="/index.js"></script>
    <script src="/transactions.js"></script>
    <script src="/budgets.js"></script>
  </body>
</html>
