<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Login</title>
    <link rel="stylesheet" href="index.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="wrapper">
      <section class="leftSide">
        <div class="logo">finance</div>
        <div class="hero-content">
          <h1>Keep track of your money and save for your future</h1>
          <p>
            Personal finance app puts you in control of your spending. Track
            transactions, set budgets, and add to savings pots easily.
          </p>
        </div>
      </section>

      <section class="cardContainer">
        <form class="card" id="signupForm">
          <h2>Create Account</h2>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Full Name" required />
            <span class="error-message" id="nameError"></span>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="your@email.com"
              required
            />
            <span class="error-message" id="emailError"></span>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
              <span class="eye" id="passwordToggle">👁</span>
            </div>
            <p class="hint">Passwords must be at least 8 characters</p>
            <span class="error-message" id="passwordError"></span>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="confirmPassword"
                placeholder="••••••••"
                required
              />
              <span class="eye" id="confirmPasswordToggle">👁</span>
            </div>
            <span class="error-message" id="confirmPasswordError"></span>
          </div>
          <button type="submit" class="bg-black text-white" id="signupBtn">
            Create Account
          </button>
          <div class="success-message" id="successMessage"></div>
          <p class="bottom-text">
            Already have an account? <a href="/login.html">Login</a>
          </p>
        </form>
      </section>
    </div>
    <script src="/index.js"></script>
  </body>
</html>
