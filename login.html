<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Login</title>
    <link rel="stylesheet" href="index.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="wrapper">
      <section class="leftSide">
        <div class="logo">finance</div>
        <div class="hero-content">
          <h1>Keep track of your money and save for your future</h1>
          <p>
            Personal finance app puts you in control of your spending. Track
            transactions, set budgets, and add to savings pots easily.
          </p>
        </div>
      </section>

      <section class="cardContainer">
        <form class="card" id="loginForm">
          <h2>Login</h2>
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="your@email.com"
              required
            />
            <span class="error-message" id="loginEmailError"></span>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="loginPassword"
                placeholder="••••••••"
                required
              />
              <span class="eye" id="loginPasswordToggle">👁</span>
            </div>
            <span class="error-message" id="loginPasswordError"></span>
          </div>
          <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
            <input
              type="checkbox"
              id="rememberMe"
              style="width: 18px; height: 18px; cursor: pointer;"
            />
            <label for="rememberMe" style="margin: 0; cursor: pointer; font-size: 14px; color: #666;">
              Remember me
            </label>
          </div>
          <button type="submit" class="bg-black text-white" id="loginBtn">
            Login
          </button>
          <div class="error-message" id="loginError"></div>
          <p class="bottom-text">
            Need to create an account? <a href="/signup.html">Sign Up</a>
          </p>
        </form>
      </section>
    </div>
    <script src="/index.js"></script>
  </body>
</html>
